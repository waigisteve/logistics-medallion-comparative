<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 600 16px Arial, sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .node { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.3; rx: 14; }
      .label { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .connector { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <text x="40" y="48" class="title">Multicloud Logistics Architecture Overview</text>
  <text x="40" y="76" class="subtitle">Each route follows the same medallion shape while using platform-native services</text>

  <rect x="40" y="110" width="720" height="360" class="panel"/>
  <text x="60" y="140" class="subtitle">AWS</text>
  <rect x="70" y="200" width="120" height="90" class="node"/><image href="../icons/aws/kinesis-data-streams.svg" x="85" y="218" width="30" height="30"/><text x="123" y="238" class="label">Kinesis</text>
  <rect x="220" y="200" width="120" height="90" class="node"/><image href="../icons/aws/s3.svg" x="235" y="218" width="30" height="30"/><text x="273" y="238" class="label">S3 Bronze</text>
  <rect x="370" y="200" width="120" height="90" class="node"/><image href="../icons/aws/glue.svg" x="385" y="218" width="30" height="30"/><text x="423" y="238" class="label">Glue</text>
  <rect x="520" y="200" width="120" height="90" class="node"/><image href="../icons/aws/s3.svg" x="535" y="218" width="30" height="30"/><text x="573" y="238" class="label">Silver/Gold</text>
  <rect x="630" y="200" width="100" height="90" class="node"/><image href="../icons/oss/snowflake.svg" x="645" y="218" width="30" height="30"/><text x="683" y="238" class="label">Snowflake</text>
  <path d="M190 245 H220" class="connector"/><path d="M340 245 H370" class="connector"/><path d="M490 245 H520" class="connector"/><path d="M640 245 H630" class="connector"/>
  <text x="70" y="340" class="small">Controls: S3 versioning, dedup in Glue or Flink, CloudWatch alerts</text>

  <rect x="800" y="110" width="760" height="360" class="panel"/>
  <text x="820" y="140" class="subtitle">Azure</text>
  <rect x="830" y="200" width="120" height="90" class="node"/><image href="../icons/azure/event-hubs.svg" x="845" y="218" width="30" height="30"/><text x="883" y="238" class="label">Event Hubs</text>
  <rect x="980" y="200" width="120" height="90" class="node"/><image href="../icons/azure/storage-account.svg" x="995" y="218" width="30" height="30"/><text x="1033" y="238" class="label">ADLS Bronze</text>
  <rect x="1130" y="200" width="120" height="90" class="node"/><image href="../icons/azure/stream-analytics.svg" x="1145" y="218" width="30" height="30"/><text x="1183" y="238" class="label">Processing</text>
  <rect x="1280" y="200" width="120" height="90" class="node"/><image href="../icons/azure/storage-account.svg" x="1295" y="218" width="30" height="30"/><text x="1333" y="238" class="label">Silver/Gold</text>
  <rect x="1430" y="200" width="100" height="90" class="node"/><image href="../icons/oss/snowflake.svg" x="1445" y="218" width="30" height="30"/><text x="1483" y="238" class="label">Snowflake</text>
  <path d="M950 245 H980" class="connector"/><path d="M1100 245 H1130" class="connector"/><path d="M1250 245 H1280" class="connector"/><path d="M1400 245 H1430" class="connector"/>
  <text x="830" y="340" class="small">Controls: ADLS soft delete, dedup in Stream Analytics or Databricks, Monitor alerts</text>

  <rect x="40" y="520" width="720" height="360" class="panel"/>
  <text x="60" y="550" class="subtitle">GCP</text>
  <rect x="70" y="610" width="120" height="90" class="node"/><image href="../icons/gcp/pubsub.svg" x="85" y="628" width="30" height="30"/><text x="123" y="648" class="label">Pub/Sub</text>
  <rect x="220" y="610" width="120" height="90" class="node"/><image href="../icons/gcp/cloud-storage.svg" x="235" y="628" width="30" height="30"/><text x="273" y="648" class="label">Bronze</text>
  <rect x="370" y="610" width="120" height="90" class="node"/><image href="../icons/gcp/dataflow.svg" x="385" y="628" width="30" height="30"/><text x="423" y="648" class="label">Dataflow</text>
  <rect x="520" y="610" width="120" height="90" class="node"/><image href="../icons/gcp/cloud-storage.svg" x="535" y="628" width="30" height="30"/><text x="573" y="648" class="label">Silver</text>
  <rect x="650" y="610" width="90" height="90" class="node"/><image href="../icons/gcp/bigquery.svg" x="663" y="628" width="30" height="30"/><text x="701" y="648" class="label">BQ</text>
  <path d="M190 655 H220" class="connector"/><path d="M340 655 H370" class="connector"/><path d="M490 655 H520" class="connector"/><path d="M640 655 H650" class="connector"/>
  <text x="70" y="750" class="small">Controls: GCS versioning, Dataflow dedup, Security Command Center</text>

  <rect x="800" y="520" width="760" height="360" class="panel"/>
  <text x="820" y="550" class="subtitle">Hybrid</text>
  <rect x="830" y="610" width="120" height="90" class="node"/><image href="../icons/oss/kafka.svg" x="845" y="628" width="30" height="30"/><text x="883" y="648" class="label">Kafka</text>
  <rect x="980" y="610" width="120" height="90" class="node"/><image href="../icons/oss/minio.svg" x="995" y="628" width="30" height="30"/><text x="1033" y="648" class="label">Bronze</text>
  <rect x="1130" y="610" width="120" height="90" class="node"/><image href="../icons/oss/spark.svg" x="1145" y="628" width="30" height="30"/><text x="1183" y="648" class="label">Processing</text>
  <rect x="1280" y="610" width="120" height="90" class="node"/><image href="../icons/oss/minio.svg" x="1295" y="628" width="30" height="30"/><text x="1333" y="648" class="label">Silver/Gold</text>
  <rect x="1430" y="610" width="100" height="90" class="node"/><image href="../icons/oss/trino.svg" x="1445" y="628" width="30" height="30"/><text x="1483" y="648" class="label">Trino</text>
  <path d="M950 655 H980" class="connector"/><path d="M1100 655 H1130" class="connector"/><path d="M1250 655 H1280" class="connector"/><path d="M1400 655 H1430" class="connector"/>
  <text x="830" y="750" class="small">Controls: MinIO versioning, snapshot rollback, replay from Kafka, SIEM alerts</text>
</svg>
